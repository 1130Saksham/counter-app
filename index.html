<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Online Counter App - Simple Tally Counter</title>

<meta name="description" content="Free online counter app to count clicks easily. Includes themes, restart option and minimum limit.">

<meta name="keywords" content="counter app, tally counter, click counter, online counter">

<meta name="author" content="Saksham Raj">

<link rel="canonical" href="https://1130Saksham.github.io/counter-app/">

<style>

body{
margin:0;
padding:0;
background:#1e1e1e;
color:white;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
transition:0.3s;
}

/* counter */

#counter{
font-size:130px;
font-weight:bold;
transition:0.15s;
}

.pop{
transform:scale(1.2);
}

/* side buttons */

.side-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:70px;
border:none;
background:none;
color:white;
cursor:pointer;
}

.left{left:40px}
.right{right:40px}

.side-btn:hover{
transform:translateY(-50%) scale(1.2);
}

/* restart */

.restart{
position:absolute;
bottom:40px;
padding:10px 30px;
font-size:18px;
border:none;
background:#444;
color:white;
border-radius:6px;
cursor:pointer;
}

/* settings icon */

.menu-container{
position:fixed;
top:20px;
right:20px;
z-index:1000;
}

.menu-icon{
font-size:28px;
cursor:pointer;
transition:0.3s;
}

.menu-icon:hover{
transform:rotate(90deg);
}

/* menu */

.menu{
position:absolute;
top:40px;
right:0;
display:none;
background:#2a2a2a;
padding:20px;
border-radius:10px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.menu input{
width:100%;
padding:6px;
margin:5px 0 10px;
}

.menu button{
width:100%;
padding:6px;
margin-bottom:10px;
background:#444;
border:none;
color:white;
cursor:pointer;
}

/* color palette */

.color-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}

.color{
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
}

.c1{background:#1e1e1e}
.c2{background:#000}
.c3{background:#fff}
.c4{background:#3498db}
.c5{background:#9b59b6}
.c6{background:#2ecc71}
.c7{background:#e74c3c}
.c8{background:#e67e22}
.c9{background:#ff69b4}

</style>
</head>

<body>

<div class="menu-container">

<div class="menu-icon" id="menuBtn">⚙</div>

<div class="menu" id="menu">

<h3>Settings</h3>

<label>Set Counter Value</label>
<input type="number" id="setValue">
<button onclick="setCounter()">Apply</button>

<label>Minimum Limit</label>
<input type="number" id="minLimit">
<button onclick="setLimit()">Apply</button>

<h4>Theme Color</h4>

<div class="color-grid">

<div class="color c1" onclick="changeColor('#1e1e1e')"></div>
<div class="color c2" onclick="changeColor('#000000')"></div>
<div class="color c3" onclick="changeColor('#ffffff')"></div>
<div class="color c4" onclick="changeColor('#3498db')"></div>
<div class="color c5" onclick="changeColor('#9b59b6')"></div>
<div class="color c6" onclick="changeColor('#2ecc71')"></div>
<div class="color c7" onclick="changeColor('#e74c3c')"></div>
<div class="color c8" onclick="changeColor('#e67e22')"></div>
<div class="color c9" onclick="changeColor('#ff69b4')"></div>

</div>

</div>

</div>

<button id="decrease" class="side-btn left">−</button>

<h1 id="counter">0</h1>

<button id="increase" class="side-btn right">+</button>

<button class="restart" onclick="restartCounter()">Restart</button>

<script>

let count = localStorage.getItem("count") || 0
let minLimit = null

const counter = document.getElementById("counter")
const menu = document.getElementById("menu")
const menuBtn = document.getElementById("menuBtn")

counter.innerText = count

function updateCounter(){

counter.innerText = count
localStorage.setItem("count",count)

counter.classList.add("pop")

setTimeout(()=>{
counter.classList.remove("pop")
},150)

}

/* increase */

function increase(){
count++
updateCounter()
}

/* decrease */

function decrease(){

if(minLimit !== null && count-1 < minLimit){
alert("Minimum limit reached")
return
}

count--
updateCounter()

}

document.getElementById("increase").onclick = increase
document.getElementById("decrease").onclick = decrease

/* restart */

function restartCounter(){
count = 0
updateCounter()
}

/* set counter */

function setCounter(){

let value=document.getElementById("setValue").value

if(value!==""){
count=parseInt(value)
updateCounter()
}

}

/* set limit */

function setLimit(){

let value=document.getElementById("minLimit").value

if(value!==""){
minLimit=parseInt(value)
alert("Minimum limit set")
}

}

/* menu open */

menuBtn.onclick=(e)=>{
e.stopPropagation()
menu.style.display="block"
}

/* close menu */

document.addEventListener("click",(e)=>{
if(!menu.contains(e.target) && e.target!==menuBtn){
menu.style.display="none"
}
})

/* change color */

function changeColor(color){

document.body.style.background=color

if(color==="#ffffff"){
document.body.style.color="black"
}else{
document.body.style.color="white"
}

}

/* keyboard support */

document.addEventListener("keydown",(e)=>{

if(e.key==="+") increase()
if(e.key==="-") decrease()

})

</script>

</body>

</html>
